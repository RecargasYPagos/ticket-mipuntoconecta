<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Punto Conecta - Sistema PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
font-family: monospace;
background:#ddd;
padding:10px;
}

.panel{
max-width:450px;
margin:auto;
background:white;
padding:10px;
border:1px solid #ccc;
}

h3{
text-align:center;
}

input, select, button{
width:100%;
padding:6px;
margin:4px 0;
font-family: monospace;
}

#ticketArea{
background:white;
padding:15px;
margin-top:10px;
border:1px solid #ccc;
}

pre{
font-size:12px;
white-space:pre-wrap;
line-height:1.2;
}
</style>
</head>

<body>

<div class="panel">

<h3>MI PUNTO CONECTA</h3>

<select id="operadora">
<option value="Telcel">Telcel</option>
<option value="BAIT">BAIT</option>
<option value="AXIOS">AXIOS</option>
<option value="AT&T">AT&T</option>
<option value="MOVISTAR">Movistar</option>
</select>

<input id="monto" placeholder="Monto (ej: 50)">
<input id="numero" placeholder="Número">
<input id="folio" placeholder="Folio">

<select id="modo">
<option value="contado">Contado</option>
<option value="credito">A crédito</option>
</select>

<input id="plazo" placeholder="Plazo (días si es crédito)">

<button onclick="agregarRecarga()">+ Agregar recarga</button>
<button onclick="generar()">Generar Ticket</button>
<button onclick="descargar()">Descargar Imagen</button>

<div id="ticketArea">
<pre id="ticket"></pre>
</div>

</div>

<script>

/* =======================
   BASE DE PLANES
======================= */

const planes = {

"Telcel":{
10:{p:"Amigo Sin Límite", b:"*264 https://www.telcel.com"},
20:{p:"Amigo Sin Límite", b:"100MB + WhatsApp ilimitado (2 días)"},
30:{p:"Amigo Sin Límite", b:"160MB + redes sociales (3 días)"},
50:{p:"Amigo Sin Límite", b:"500MB + redes ilimitadas (7 días)"},
80:{p:"Amigo Sin Límite", b:"800MB + 1.5GB redes (12 días)"},
100:{p:"Amigo Sin Límite", b:"1.5GB + redes ilimitadas (15 días)"},
150:{p:"Amigo Sin Límite", b:"2.5GB + Prime Video (25 días)"},
200:{p:"Amigo Sin Límite", b:"3.5GB + servicios (30 días)"}
},

"BAIT":{
30:{p:"BAIT", b:"1GB + redes (3 días)"},
50:{p:"BAIT", b:"2GB + redes ilimitadas (7 días)"},
60:{p:"BAIT", b:"4GB + redes ilimitadas (7 días)"},
100:{p:"BAIT", b:"5GB + redes ilimitadas (15 días)"},
120:{p:"BAIT", b:"Internet ilimitado (15 días)"},
125:{p:"BAIT", b:"8GB + redes (20 días)"},
200:{p:"BAIT", b:"12GB + redes (30 días)"}
},

"AXIOS":{
15:{p:"Axios", b:"500MB + llamadas (1 día)"},
30:{p:"Axios", b:"500MB + 250 min (3 días)"},
50:{p:"Axios", b:"2GB + redes ilimitadas (7 días)"},
70:{p:"Axios", b:"6GB + redes ilimitadas (7 días)"},
100:{p:"Axios", b:"2GB + redes ilimitadas (30 días)"}
},

"AT&T":{
10:{p:"AT&T", b:"100MB + redes (1 día)"},
20:{p:"AT&T", b:"200MB + redes (1 día)"},
30:{p:"AT&T", b:"300MB + redes (3 días)"},
50:{p:"AT&T", b:"750MB + redes (5 días)"},
70:{p:"AT&T", b:"4.5GB + redes (10 días)"},
100:{p:"AT&T", b:"2GB + redes (14 días)"}
},

"MOVISTAR":{
10:{p:"Movistar", b:"*611 https://www.movistar.com.mx"},
20:{p:"Movistar", b:"*611 https://www.movistar.com.mx"},
30:{p:"Movistar", b:"Vigencia 3 días"},
50:{p:"Movistar", b:"7 días + redes + 600MB"},
100:{p:"Movistar", b:"Vigencia 15 días"}
}

};

/* =======================
   VARIABLES
======================= */

let recargas = [];

/* =======================
   AGREGAR RECARGA
======================= */

function agregarRecarga(){

let op = document.getElementById("operadora").value;
let monto = parseFloat(document.getElementById("monto").value);
let numero = document.getElementById("numero").value;

if(!monto || !numero){
alert("Faltan datos");
return;
}

recargas.push({operadora:op,monto:monto,numero:numero});

alert("Recarga agregada ✔");

document.getElementById("monto").value = "";
document.getElementById("numero").value = "";
}

/* =======================
   PLAN
======================= */

function obtenerPlan(op, monto){
let p = planes[op];
if(!p) return {p:"Personalizado", b:"Sin datos"};
return p[monto] || {p:"Personalizado", b:"Sin paquete"};
}

/* =======================
   GENERAR TICKET
======================= */

function generar(){

if(recargas.length === 0){
agregarRecarga();
}

let folio = document.getElementById("folio").value;
let modo = document.getElementById("modo").value;
let plazo = parseInt(document.getElementById("plazo").value) || 0;

let now = new Date();

let comision = 5;
let total = 0;
let detalle = "";

/* RECORRER RECARGAS */
for(let r of recargas){

let plan = obtenerPlan(r.operadora, r.monto);

let subtotal = r.monto + comision;
total += subtotal;

detalle += `
OPERADORA: ${r.operadora}
NUMERO: ${r.numero}
MONTO: $${r.monto}
COMISIÓN: $${comision}
PAQUETE: ${plan.p}
BENEFICIOS: ${plan.b}
--------------------------------
`;
}

/* FECHA CRÉDITO (HOY = DÍA 1) */
let fechaPagoTexto = "";

if(modo === "credito"){

let fechaPago = new Date();
fechaPago.setDate(fechaPago.getDate() + (plazo - 1));

fechaPagoTexto = `
TIPO: A CRÉDITO
PLAZO: ${plazo} días
FECHA DE PAGO: ${fechaPago.toLocaleDateString()}
`;
}else{
fechaPagoTexto = "TIPO: CONTADO";
}

/* TICKET */
let ticket = `
================================
        MI PUNTO CONECTA
   RECARGAS, PAGOS Y SERVICIOS
================================

${detalle}

--------------------------------
TOTAL GENERAL: $${total}

--------------------------------
${fechaPagoTexto}

FOLIO: ${folio}

FECHA: ${now.toLocaleDateString()}
HORA: ${now.toLocaleTimeString()}

================================
GRACIAS POR SU PREFERENCIA
================================
`;

document.getElementById("ticket").textContent = ticket;

recargas = [];
}

/* =======================
   DESCARGAR
======================= */

function descargar(){
html2canvas(document.getElementById("ticketArea")).then(canvas=>{
let a = document.createElement("a");
a.download = "ticket.png";
a.href = canvas.toDataURL();
a.click();
});
}

</script>

</body>
</html>
